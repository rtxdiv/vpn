<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Главная</title>
    <link rel="icon" href="data:,">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Commissioner:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/public/index.css">
</head>
<body>

    <div class="block container" id="settings-message"><a class="message"></a></div>

    <div class="scroll-container" id="client">

        <div class="block" id="client-info">
            <div class="top">
                <a class="status"></a>
                <a class="name"></a>
                <a class="devices"></a>
                <a class="date"></a>
            </div>
            <div class="bottom">
                <div class="sqare-btn" onclick="scrollXTo('#client-settings')">
                    <img src="/public/img/settings.png">
                </div>
            </div>
        </div>

        <div class="block" id="client-settings">
            <div class="top">
                <div class="rect-btn copy" onclick="copySubLink()">
                    <span class="text">Скопировать ссылку</span>
                </div>
                <div class="rect-btn link">
                    <span class="text">Подписка ↗</span>
                </div>
                <div class="rect-btn reset" onclick="showBtnResult({ elem: this, error: true, message: 'В разработке...' })">
                    <span class="text">Сбросить ID</span>
                </div>
            </div>
            <div class="bottom">
                <div class="back sqare-btn" onclick="scrollXTo('#client-info')">
                    <img src="/public/img/back.png">
                </div>
            </div>
        </div>

    </div>
    <div class="block container" id="client-error"><a class="message"></a></div>


    <div class="block container" id="help">
        <div id="help-payments">Мои платежи</div>
        <div id="help-about">О нас</div>
        <div id="help-tutorial">Инструкции</div>
        <div id="help-support">Поддержка</div>
    </div>


    <div class="scroll-container" id="tariffs">

        <!-- <div class="block">
            <div class="top">
                <a class="country"></a>
                <a class="name"></a>
                <a class="devices"></a>
                <a class="traffic"></a>
                <a class="price"><span class="note"></span></a>
            </div>
            <div class="bottom">
                <div class="rect-btn">Upgrade</div>
                <div class="rect-btn">Buy</div>
            </div>
        </div> -->

    </div>
    <div class="block container" id="tariffs-error"><a class="message"></a></div>


    <div id="popup-bg">
        <div id="popup">
            <div id="popup-content">
                <input type="text" class="uname">
                <a class="title"></a>
                <a class="text"></a>
                <div class="radiogroup"></div>
                <div class="button"></div>
                <span class="offer">Создавая платёж, вы принимаете <a onclick="openOffer()">публичную оферту</a></span>
            </div>
            <div id="popup-error"><a class="message"></a></div>
        </div>
    </div>

    <script src="/public/telegram-web-app.js"></script>
    <script src="/public/index.js"></script>
</body>
</html>
