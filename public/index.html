<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rtdVPN</title>
    <link rel="icon" href="data:,">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=PT+Sans+Caption:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Commissioner:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="public/style.css">
</head>
<body>

    <div class="block container" id="settings-message"><a class="message"></a></div>

    <div class="scroll-container" id="client">

        <div class="block" id="client-info">
            <div class="top">
                <a class="status"></a>
                <a class="name"></a>
                <a class="devices"></a>
                <a class="date"></a>
            </div>
            <div class="bottom">
                <div class="settings sqare-btn" onclick="scrollXTo('#client-settings')">
                    <img src="public/img/settings.png">
                </div>
                <div class="history sqare-btn" onclick="scrollXTo('#client-periods')">
                    <img src="public/img/history.png">
                </div>
            </div>
        </div>

        <div class="block" id="client-settings">
            <div class="top">
                <div class="rect-btn" class="copy" onclick="copySubLink()">
                    Скопировать ссылку
                    <div class="overflow"></div>
                </div>
                <div class="rect-btn" class="link">
                    Подписка ↗
                </div>
                <div class="rect-btn" onclick="showBtnResult({ elem: this, error: true, message: 'soon...' })">
                    Сбросить ID
                    <div class="overflow"></div>
                </div>
            </div>
            <div class="bottom">
                <div class="back sqare-btn" onclick="scrollXTo('#client-info')">
                    <img src="public/img/back.png">
                </div>
            </div>
        </div>

        <div class="block" id="client-periods">
            <div class="top">
                soon...
            </div>
            <div class="bottom">
                <div class="back sqare-btn" onclick="scrollXTo('#client-info')">
                    <img src="public/img/back.png">
                </div>
            </div>
        </div>

    </div>
    <div class="block container" id="client-error"><a class="message"></a></div>


    <div class="block container" id="help">
        <div id="help-about">О нас</div>
        <div id="help-tutorial">Инструкции</div>
        <div id="help-support">Поддержка</div>
    </div>


    <div class="scroll-container" id="tariffs">

        <!-- <div class="block">
            <div class="top">
                <a class="country"></a>
                <a class="name"></a>
                <a class="devices"></a>
                <a class="traffic"></a>
                <a class="price"><span class="note"></span></a>
            </div>
            <div class="bottom">
                <div class="rect-btn">Upgrade</div>
                <div class="rect-btn">Buy</div>
            </div>
        </div> -->

    </div>
    <div class="block container" id="tariffs-error"><a class="message"></a></div>



    <div id="popup-bg">
        <div id="popup">
            <a id="popup-title">
                TITLE > SOME
            </a>
            <a id="popup-text">
                this is popuptext
            </a>
            <div id="popup-radiogroup">
                <label>
                    <input type="radio" name="popup-option">
                    <span>1 меc.</span>
                </label>
                <label>
                    <input type="radio" name="popup-option">
                    <span>2 мес.</span>
                </label>
                <label>
                    <input type="radio" name="popup-option">
                    <span>3 мес.</span>
                </label>
            </div>
            <div id="popup-button">
                Кнопка нажать
            </div>
        </div>
    </div>

    <script src="public/telegram-web-app.js"></script>
    <script src="public/script.js"></script>
</body>
</html>
