<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rtdVPN</title>
    <link rel="icon" href="data:,">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=PT+Sans+Caption:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Commissioner:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="public/style.css">
</head>
<body>

    <div class="block container" id="settings-message"><a class="message"></a></div>

    <div class="scroll-container" id="sub">

        <div class="block" id="sub-info">
            <div class="top">
                <a class="status"></a>
                <a class="name"></a>
                <a class="devices"></a>
                <a class="date"></a>
            </div>
            <div class="bottom">
                <div class="settings sqare-btn" onclick="location.href='#sub-settings'">
                    <img src="public/img/settings.png">
                </div>
                <div class="history sqare-btn" onclick="location.href='#sub-periods'">
                    <img src="public/img/history.png">
                </div>
            </div>
        </div>

        <div class="block" id="sub-settings">
            <div class="top">
                <div class="rect-btn">
                    Скопировать ссылку
                </div>
                <div class="rect-btn">
                    Подписка
                </div>
                <div class="rect-btn">
                    Сбросить ID
                </div>
            </div>
            <div class="bottom">
                <div class="back sqare-btn" onclick="location.href='#sub-info'">
                    <img src="public/img/back.png">
                </div>
            </div>
        </div>

        <div class="block" id="sub-periods">
            <div class="top">

            </div>
            <div class="bottom">
                <div class="back sqare-btn" onclick="location.href='#sub-info'">
                    <img src="public/img/back.png">
                </div>
            </div>
        </div>

    </div>
    <div class="block container" id="sub-error"><a class="message"></a></div>


    <div class="container" id="help">
            
        <div id="help-about">
            <img src="public/img/about.png">
            <a>О нас</a>
        </div>

        <div id="help-tutorial">
            <img src="public/img/tutorial.png">
            <a>Инструкции</a>
        </div>

        <div id="help-support">
            <img src="public/img/support.png">
            <a>Поддержка</a>
        </div>

    </div>


    <div class="scroll-container" id="tariffs">

        <!-- <div class="block">
            <div class="top">
                <a class="country"></a>
                <a class="name"></a>
                <a class="devices"></a>
                <a class="traffic"></a>
                <a class="price"><span class="note"></span></a>
            </div>
            <div class="bottom">
                <div class="rect-btn">Upgrade</div>
                <div class="rect-btn">Buy</div>
            </div>
        </div> -->

    </div>
    <div class="block container" id="tariffs-error"><a class="message"></a></div>

    <script src="public/telegram-web-app.js"></script>
    <script src="public/script.js"></script>
</body>
</html>
